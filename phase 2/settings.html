<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="settings.css">
</head>
<body>
    <h2>Settings</h2>

<div class="setting">
    <h3>Currency</h3>
    <p>Current: <span id="currencyDisplay">USD</span></p>
    <button onclick="toggleCurrency()">Toggle Currency</button>
</div>

<div class="setting">
    <h3>Notifications</h3>

    <label>
        <input type="checkbox" id="lowBalanceToggle" onchange="saveSettings()">
        Low Balance Alerts
    </label>

    <br><br>

    <label>
        <input type="checkbox" id="billDueToggle" onchange="saveSettings()">
        Bill Due Alerts
    </label>
</div>




<script src="settings.js"></script>
    
    
</body>
</html>
