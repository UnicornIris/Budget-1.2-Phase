<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Goals — Budget</title>
    <link rel="stylesheet" href="vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="goal.css"> 
</head>
<body>
<div class="phone-frame">
<div class="app-container goals-page">
    <header class="screen-header">
        <h1 class="screen-title">Goals</h1>
    </header>

    <div class="card">
        <h3 class="card-section-title">Create goal</h3>
        <input type="text" id="goal-name" placeholder="Goal name (e.g. Laptop)">
        <input type="number" id="goal-amount" placeholder="Target amount">
        <input type="date" id="goal-date">
        <button type="button" onclick="addGoal()">Add goal</button>
        <p id="goal-form-helper" class="goal-form-helper">Create a goal, then manage savings and edits directly in each card.</p>
    </div>

    <h2 class="screen-title" style="font-size:1.125rem;margin-top:16px;">Active goals</h2>
    <div id="goals-list" class="goals-list"></div>
    <h2 class="screen-title" style="font-size:1.125rem;margin-top:16px;">Completed goals</h2>
    <div id="completed-goals-list"></div>
</div>

<div id="keyboard-demo" class="keyboard-demo hidden" aria-hidden="true">
    <div class="keyboard-layout keyboard-layout-text">
        <div class="keyboard-row">
            <span class="keyboard-key">Q</span>
            <span class="keyboard-key">W</span>
            <span class="keyboard-key">E</span>
            <span class="keyboard-key">R</span>
            <span class="keyboard-key">T</span>
            <span class="keyboard-key">Y</span>
            <span class="keyboard-key">U</span>
            <span class="keyboard-key">I</span>
            <span class="keyboard-key">O</span>
            <span class="keyboard-key">P</span>
        </div>
        <div class="keyboard-row keyboard-row-offset">
            <span class="keyboard-key">A</span>
            <span class="keyboard-key">S</span>
            <span class="keyboard-key">D</span>
            <span class="keyboard-key">F</span>
            <span class="keyboard-key">G</span>
            <span class="keyboard-key">H</span>
            <span class="keyboard-key">J</span>
            <span class="keyboard-key">K</span>
            <span class="keyboard-key">L</span>
        </div>
        <div class="keyboard-row">
            <span class="keyboard-key keyboard-key-action keyboard-key-wide">shift</span>
            <span class="keyboard-key">Z</span>
            <span class="keyboard-key">X</span>
            <span class="keyboard-key">C</span>
            <span class="keyboard-key">V</span>
            <span class="keyboard-key">B</span>
            <span class="keyboard-key">N</span>
            <span class="keyboard-key">M</span>
            <span class="keyboard-key keyboard-key-action keyboard-key-wide">delete</span>
        </div>
        <div class="keyboard-row keyboard-row-bottom">
            <span class="keyboard-key keyboard-key-action keyboard-key-medium">123</span>
            <span class="keyboard-key keyboard-key-action keyboard-key-medium">emoji</span>
            <span class="keyboard-key keyboard-key-space">space</span>
            <span class="keyboard-key keyboard-key-action keyboard-key-medium">return</span>
        </div>
    </div>

    <div class="keyboard-layout keyboard-layout-number">
        <div class="keyboard-number-grid">
            <span class="keyboard-key">1</span>
            <span class="keyboard-key">2</span>
            <span class="keyboard-key">3</span>
            <span class="keyboard-key">4</span>
            <span class="keyboard-key">5</span>
            <span class="keyboard-key">6</span>
            <span class="keyboard-key">7</span>
            <span class="keyboard-key">8</span>
            <span class="keyboard-key">9</span>
            <span class="keyboard-key keyboard-key-action">.</span>
            <span class="keyboard-key">0</span>
            <span class="keyboard-key keyboard-key-action">delete</span>
        </div>
        <div class="keyboard-number-footer">
            <span class="keyboard-key keyboard-key-action keyboard-key-medium">#+=</span>
            <span class="keyboard-key keyboard-key-space">space</span>
            <span class="keyboard-key keyboard-key-action keyboard-key-medium">done</span>
        </div>
    </div>
</div>

<script src="goals.js"></script>

<nav class="navigationtab" aria-label="Main">
    <a href="activity.html" class="nav-item">
        <i class="fa-solid fa-money-bill-transfer" aria-hidden="true"></i>
        <span class="label">Activity</span>
    </a>
    <a href="goals.html" class="nav-item active">
        <i class="fa-solid fa-flag-checkered" aria-hidden="true"></i>
        <span class="label">Goals</span>
    </a>
    <a href="reports.html" class="nav-item">
        <i class="fa-solid fa-chart-column" aria-hidden="true"></i>
        <span class="label">Reports</span>
    </a>
    <a href="settings.html" class="nav-item">
        <i class="fa-solid fa-user-gear" aria-hidden="true"></i>
        <span class="label">Settings</span>
    </a>
</nav>
</div>
</body>
</html>
