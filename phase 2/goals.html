<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals - Budget App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    <div class="card">
        <h1 style="color: #597D5E; margin: 0;">
            <i class="fa-solid fa-flag-checkered"></i> My Goals
        </h1>
    </div>

    <div class="card" style="border-top: 4px solid #597D5E;">
        <h3 style="color: #333; margin-top: 0;">Create Goal</h3>
        
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <div>
                <label style="font-size: 0.8rem; font-weight: bold; color: #666;">Goal Name</label>
                <input type="text" id="goal-name" placeholder="e.g. New Laptop" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
            </div>

            <div>
                <label style="font-size: 0.8rem; font-weight: bold; color: #666;">Target Amount ($)</label>
                <input type="number" id="goal-amount" placeholder="Target amount" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
            </div>

            <div>
                <label style="font-size: 0.8rem; font-weight: bold; color: #666;">Target Date</label>
                <input type="date" id="goal-date" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
            </div>

            <button onclick="addGoal()" class="btn-primary" style="background-color: #597D5E; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px;">
                <i class="fa-solid fa-plus"></i> Add Goal
            </button>
        </div>
    </div>
